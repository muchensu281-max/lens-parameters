<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a0a2e">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Lens Parameters</title>
    <link rel="icon" type="image/jpeg" href="http://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>
<div class="bg-overlay"></div>
<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="bg-glow g3"></div>

<header class="header">
    <div class="header-inner">
        <div class="header-logo">
            <img class="header-favicon"
                 src="http://q.qlogo.cn/headimg_dl?dst_uin=3527377813&spec=640&img_type=jpg"
                 alt="logo">
            <span class="header-title">Lens Parameters</span>
        </div>
        <button class="header-btn" id="resetBtn" disabled>重置</button>
    </div>
</header>

<div class="container">
    <div class="upload-wrapper" id="uploadWrapper">
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon-wrapper">
                <svg class="upload-icon" viewBox="0 0 24 24">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.042.34 8.36010.910 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-50-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-555h-3z"/>
                </svg>
            </div>
            <div class="upload-title">点击或拖拽上传图片</div>
            <div class="upload-subtitle">支持 JPG · PNG · HEIC 等格式<br>可批量选择多张</div>
            <input type="file" id="fileInput" accept="image/*,.heic,.heif" multiple>
        </div></div>

    <div class="files-section" id="filesSection">
        <div class="section-header">
            <span class="section-title">📷 已选 <span id="fileCount">0</span> 张</span>
            <button class="add-more-btn" id="addMoreBtn">＋ 继续添加</button>
        </div>
        <div class="files-grid" id="filesGrid"></div>
    </div>

    <div class="presets-section" id="presetsSection">
        <div class="section-header mb-3">
            <span class="section-title">📱 设备预设</span>
        </div>
        <div class="brand-tabs" id="brandTabs">
            <button class="brand-tab active" data-brand="apple">🍎 Apple</button>
            <button class="brand-tab" data-brand="vivo">vivo</button>
            <button class="brand-tab" data-brand="iqoo">iQOO</button>
            <button class="brand-tab" data-brand="oppo">OPPO</button>
            <button class="brand-tab" data-brand="oneplus">一加</button>
            <button class="brand-tab" data-brand="xiaomi">小米</button><button class="brand-tab" data-brand="redmi">红米</button>
        </div>
        <div class="preset-grid" id="presetGrid"></div>
    </div>

    <div class="form-sections" id="formSections">
        <div class="form-card expanded">
            <div class="card-header">
                <div class="card-title">
                    <svg class="card-icon" viewBox="0 0 24 24">
                        <path d="M12 2a10 10 0 1 0 .01 0H12zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm.75-13h-1.5v5.35l4.35 2.61.75-1.23-3.6-2.13V7z"/>
                    </svg>
                    时间设置
                </div>
                <svg class="card-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">拍摄时间</label>
                    <div class="dt-wrap">
                        <input type="datetime-local" class="form-input" id="dateTimeOriginal">
                        <span class="dt-placeholder" id="dtPlaceholder">点击设置拍摄时间 →</span>
                    </div>
                </div></div>
        </div>

        <div class="form-card">
            <div class="card-header">
                <div class="card-title">
                    <svg class="card-icon" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2
                                 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8
                                 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0
                                 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
                    </svg>镜头与焦距
                </div>
                <svg class="card-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">设备厂商</label>
                        <input type="text" class="form-input" id="make" placeholder="Apple">
                    </div>
                    <div class="form-group">
                        <label class="form-label">设备型号</label>
                        <input type="text" class="form-input" id="model" placeholder="iPhone 16 Pro">
                    </div>
                    <div class="form-group col-full">
                        <label class="form-label">镜头型号</label>
                        <input type="text" class="form-input" id="lensModel"
                               placeholder="iPhone 16 Pro 后置摄像头 — 6.86mm f/1.78">
                    </div>
                    <div class="form-group">
                        <label class="form-label">焦距 mm</label>
                        <input type="text" class="form-input" id="focalLength" placeholder="6.86">
                    </div>
                    <div class="form-group">
                        <label class="form-label">35mm 等效焦距</label>
                        <input type="text" class="form-input" id="focalLength35" placeholder="24">
                    </div></div>
            </div>
        </div>

        <div class="form-card">
            <div class="card-header">
                <div class="card-title">
                    <svg class="card-icon" viewBox="0 0 24 24">
                        <path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/>
                    </svg>拍摄参数
                </div>
                <svg class="card-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">光圈 f/</label>
                        <input type="text" class="form-input" id="fNumber" placeholder="1.78">
                    </div>
                    <div class="form-group">
                        <label class="form-label">快门速度</label>
                        <input type="text" class="form-input" id="exposureTime" placeholder="1/120">
                    </div>
                    <div class="form-group">
                        <label class="form-label">ISO</label>
                        <input type="text" class="form-input" id="iso" placeholder="100">
                    </div>
                    <div class="form-group">
                        <label class="form-label">曝光补偿</label>
                        <input type="text" class="form-input" id="exposureBias" placeholder="0">
                    </div></div>
            </div>
        </div>

        <div class="form-card">
            <div class="card-header">
                <div class="card-title">
                    <svg class="card-icon" viewBox="0 0 24 24">
                        <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9
                                 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h14v3H5z"/>
                    </svg>
                    分辨率设置
                </div>
                <svg class="card-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <div class="card-body">
                <div class="form-group mb-3">
                    <label class="form-label">快速选择</label>
                    <div class="res-chips">
                        <button type="button" class="res-chip" data-w="4032" data-h="3024">12MP 4032×3024</button>
                        <button type="button" class="res-chip" data-w="4000" data-h="3000">12MP 4000×3000</button>
                        <button type="button" class="res-chip" data-w="5712" data-h="4284">24MP 5712×4284</button>
                        <button type="button" class="res-chip" data-w="8064" data-h="6048">48MP 8064×6048</button>
                    </div>
                </div>
                <div class="res-tools mb-3">
                    <button type="button" class="res-tool-btn" id="originalSizeBtn" disabled>原图尺寸</button>
                    <label class="res-lock">
                        <input type="checkbox" id="lockAspect" checked>
                        <span>保持比例（不变形）</span>
                    </label>
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">导出格式</label>
                    <div class="format-tabs" id="formatTabs">
                        <button type="button" class="format-tab active" data-format="jpeg">JPEG</button>
                        <button type="button" class="format-tab" data-format="same">跟随原图</button>
                        <button type="button" class="format-tab" data-format="heif">HEIC</button>
                    </div>
                    <input type="hidden" id="outputFormat" value="jpeg">
                    <div class="format-info" id="formatInfo">JPEG 兼容性最好，后端会写入 EXIF。</div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">宽度 px</label>
                        <input type="number" class="form-input" id="imageWidth" placeholder="4032" min="1" step="1" inputmode="numeric">
                    </div>
                    <div class="form-group">
                        <label class="form-label">高度 px</label>
                        <input type="number" class="form-input" id="imageHeight" placeholder="3024" min="1" step="1" inputmode="numeric">
                    </div>
                </div>
                <div class="res-info" id="resInfo">上传图片后显示原图与导出尺寸</div>
                <div class="form-hint mt-3">💡 开启保持比例时，宽高会作为目标框等比适配；关闭后才会强制拉伸到指定宽高</div>
            </div>
        </div>

        <input type="hidden" id="software">
        <input type="hidden" id="flash">
        <input type="hidden" id="meteringMode">
        <input type="hidden" id="whiteBalance">
        <input type="hidden" id="dateTime">
        <input type="hidden" id="dateTimeDigitized">
        <input type="hidden" id="offsetTime">
        <input type="hidden" id="gpsLatitude">
        <input type="hidden" id="gpsLongitude">
        <input type="hidden" id="gpsLatitudeRef">
        <input type="hidden" id="gpsLongitudeRef">
        <input type="hidden" id="gpsAltitude">
        <input type="hidden" id="gpsAltitudeRef"></div>
</div>

<!-- 底部操作栏 -->
<div class="action-bar" id="actionBar">
    <button class="btn btn-secondary" id="clearBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>清空
    </button>
    <button class="btn btn-primary" id="exportBtn">
        <span class="bubble" id="exportBubble">✨ 可以导出了</span>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 9h-4V3H9v6H5l77 7-7zM5 18v2h14v-2H5z"/>
        </svg>导出图片
    </button>
</div>

<!-- Loading -->
<div class="loading-mask" id="loadingMask">
    <div class="spin-box"><div class="spinner"></div></div>
    <div class="loading-txt" id="loadingTxt">处理中...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!--卡密验证弹窗 -->
<div class="modal-backdrop" id="cardModal" style="z-index:600">
    <div class="modal-sheet" style="max-width:420px">
        <div class="sheet-handle"></div>
        <div class="modal-head">
            <span class="modal-title">🔑 输入卡密以导出</span>
            <button class="modal-close-btn" id="cardModalClose">×</button>
        </div>
        <div class="modal-body">
            <div style="background:rgba(255,107,157,0.12);border:1px solid rgba(255,107,157,0.25);border-radius:12px;padding:13px 15px;font-size:13px;
                        color:rgba(255,175,210,.92);margin-bottom:16px;line-height:1.7">📌 请输入卡密才能导出图片<br>
                <span style="opacity:.7;font-size:12px">格式：XXXX-XXXX-XXXX-XXXX</span>
            </div>
            <div style="margin-bottom:8px">
                <input type="text" id="cardInput"
                       style="width:100%;padding:15px 14px;border-radius:12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);
                              color:#fff;font-size:17px;font-family:monospace;
                              letter-spacing:2px;outline:none;text-transform:uppercase;
                              transition:border-color .2s,box-shadow .2s;"
                       placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19"
                       autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <div id="cardErrMsg" style="color:#f87171;font-size:13px;min-height:20px;padding:2px 4px;font-weight:500"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-primary" id="cardConfirmBtn" style="max-width:100%;height:52px;font-size:16px">
                确认并导出
            </button></div>
    </div>
</div>

<!-- 下载弹窗 -->
<div class="modal-backdrop" id="dlModal">
    <div class="modal-sheet">
        <div class="sheet-handle"></div>
        <div class="modal-head">
            <span class="modal-title">📥 导出完成</span>
            <button class="modal-close-btn" id="dlModalClose">×</button>
        </div>
        <div class="modal-body">
            <div class="dl-hint" id="dlHint">🍎 iPhone 用户：长按图片 → “添加到照片”，即可存入相册
            </div>
            <div class="dl-list" id="dlList"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-secondary" id="dlAllBtn" style="max-width:100%">全部下载</button></div>
    </div>
</div>

<!-- 教程弹窗 -->
<div class="tutorial-mask" id="tutorialMask">
    <button class="tut-close" id="tutorialClose">×</button>
    <img class="tut-img" src="jiaocheng.svg" alt="保存相册教程">
</div>

<script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js?v=20260209"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js?v=20260209"></script>
<script src="js/cards.js?v=20260620-card2"></script>
<script src="js/main.js?v=20260620-card2"></script>
</body>
</html>
