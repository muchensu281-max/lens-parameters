<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1280" viewBox="0 0 900 1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="0.55" stop-color="#34124f"/>
      <stop offset="1" stop-color="#0d1029"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9ec4"/>
      <stop offset="1" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="900" height="1280" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="170" fill="#ff6b9d" opacity=".18"/>
  <circle cx="760" cy="1050" r="210" fill="#7a5aff" opacity=".20"/>
  <text x="450" y="120" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="48" font-weight="800" fill="#fff">保存到相册教程</text>
  <text x="450" y="178" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="25" fill="#ffd6e7" opacity=".92">导出完成后，按下面步骤保存图片</text>

  <g filter="url(#shadow)">
    <rect x="92" y="250" width="716" height="240" rx="34" fill="#ffffff" opacity=".10" stroke="#ffffff" stroke-opacity=".22"/>
    <circle cx="178" cy="370" r="52" fill="url(#pink)"/>
    <text x="178" y="389" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="800" fill="#fff">1</text>
    <text x="270" y="350" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="36" font-weight="750" fill="#fff">长按导出的图片</text>
    <text x="270" y="406" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="27" fill="#fff" opacity=".72">在导出完成弹窗里按住预览图</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="550" width="716" height="240" rx="34" fill="#ffffff" opacity=".10" stroke="#ffffff" stroke-opacity=".22"/>
    <circle cx="178" cy="670" r="52" fill="url(#pink)"/>
    <text x="178" y="689" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="800" fill="#fff">2</text>
    <text x="270" y="650" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="36" font-weight="750" fill="#fff">选择“添加到照片”</text>
    <text x="270" y="706" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="27" fill="#fff" opacity=".72">iPhone Safari 会显示系统保存菜单</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="850" width="716" height="240" rx="34" fill="#ffffff" opacity=".10" stroke="#ffffff" stroke-opacity=".22"/>
    <circle cx="178" cy="970" r="52" fill="url(#pink)"/>
    <text x="178" y="989" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="800" fill="#fff">3</text>
    <text x="270" y="950" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="36" font-weight="750" fill="#fff">打开相册检查</text>
    <text x="270" y="1006" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="27" fill="#fff" opacity=".72">图片已写入新的镜头参数</text>
  </g>

  <text x="450" y="1188" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif" font-size="24" fill="#fff" opacity=".52">Lens Parameters</text>
</svg>
